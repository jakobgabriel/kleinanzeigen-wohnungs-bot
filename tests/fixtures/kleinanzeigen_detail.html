<!--
  Representative Kleinanzeigen detail-page markup, trimmed to the structure the
  enrichment parser depends on (price box + addetailslist + description).
-->
<!DOCTYPE html>
<html lang="de">
<head><meta charset="utf-8"><title>WG-Zimmer zentral</title></head>
<body>
  <div id="viewad-main">
    <h2 class="boxedarticle--price" id="viewad-price">1.180 € VB</h2>
    <ul class="addetailslist">
      <li class="addetailslist--detail">
        Wohnfläche <span class="addetailslist--detail--value">58 m²</span>
      </li>
      <li class="addetailslist--detail">
        Zimmer <span class="addetailslist--detail--value">2,5</span>
      </li>
      <li class="addetailslist--detail">
        Etage <span class="addetailslist--detail--value">3</span>
      </li>
    </ul>
    <p id="viewad-description-text">Gemütliche Altbauwohnung, provisionsfrei, ab sofort verfügbar.</p>
  </div>
</body>
</html>
