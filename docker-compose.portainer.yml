# flatwatch — Portainer Compose (identical to docker-compose.yml).
#
# This file is kept in sync with docker-compose.yml so existing Portainer stacks
# whose "Compose path" points here keep working. Either path may be used — both
# are env_file-free and interpolation-based (config comes from Portainer's
# Environment variables panel, or a local .env auto-loaded for interpolation).
# A blank value is treated as "unset" by the app, so each built-in default applies.
services:
  flatwatch:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: flatwatch:latest
    container_name: flatwatch
    restart: unless-stopped
    environment:
      # --- Sources (set at least one) ---
      KA_SEARCH_URLS: ${KA_SEARCH_URLS:-}
      RSS_URLS: ${RSS_URLS:-}
      # --- Criteria ---
      MIN_RENT: ${MIN_RENT:-}
      MAX_RENT: ${MAX_RENT:-}
      MIN_ROOMS: ${MIN_ROOMS:-}
      MAX_ROOMS: ${MAX_ROOMS:-}
      MIN_SQM: ${MIN_SQM:-}
      MAX_SQM: ${MAX_SQM:-}
      REQUIRED_KEYWORDS: ${REQUIRED_KEYWORDS:-}
      EXCLUDED_KEYWORDS: ${EXCLUDED_KEYWORDS:-}
      # --- Polling / politeness ---
      POLL_INTERVAL_MIN: ${POLL_INTERVAL_MIN:-}
      PER_REQUEST_DELAY_S: ${PER_REQUEST_DELAY_S:-}
      REQUEST_JITTER_S: ${REQUEST_JITTER_S:-}
      HTTP_TIMEOUT_S: ${HTTP_TIMEOUT_S:-}
      HTTP_MAX_RETRIES: ${HTTP_MAX_RETRIES:-}
      KA_MAX_PAGES: ${KA_MAX_PAGES:-}
      KA_DEFAULT_RADIUS_KM: ${KA_DEFAULT_RADIUS_KM:-}
      USER_AGENT: ${USER_AGENT:-}
      ENRICH_DETAIL: ${ENRICH_DETAIL:-}
      PERSIST_BATCH_SIZE: ${PERSIST_BATCH_SIZE:-}
      RECHECK_ENABLED: ${RECHECK_ENABLED:-}
      RECHECK_INTERVAL_DAYS: ${RECHECK_INTERVAL_DAYS:-}
      # --- Dedup store (NocoDB primary, JSON fallback) ---
      NOCODB_URL: ${NOCODB_URL:-}
      NOCODB_TOKEN: ${NOCODB_TOKEN:-}
      NOCODB_TABLE_ID: ${NOCODB_TABLE_ID:-}
      NOCODB_ID_FIELD: ${NOCODB_ID_FIELD:-listing_id}
      # --- Dynamic searches (optional) ---
      NOCODB_SEARCHES_TABLE_ID: ${NOCODB_SEARCHES_TABLE_ID:-}
      # --- Results table: full row per match (optional) ---
      NOCODB_LISTINGS_TABLE_ID: ${NOCODB_LISTINGS_TABLE_ID:-}
      # --- Notifications (all optional; leave blank to stay silent) ---
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_TO: ${EMAIL_TO:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-}
      HA_WEBHOOK_URL: ${HA_WEBHOOK_URL:-}
      MAX_NOTIFY_PER_CYCLE: ${MAX_NOTIFY_PER_CYCLE:-}
      # --- Health / alerting ---
      HEALTHCHECK_PORT: ${HEALTHCHECK_PORT:-8080}
      HEALTH_STALE_AFTER_MIN: ${HEALTH_STALE_AFTER_MIN:-}
      FAILURE_ALERT_THRESHOLD: ${FAILURE_ALERT_THRESHOLD:-}
      ALERT_ON_REPEATED_FAILURES: ${ALERT_ON_REPEATED_FAILURES:-}
      # --- MCP endpoint (lets Claude trigger a run; off unless MCP_ENABLED=true) ---
      MCP_ENABLED: ${MCP_ENABLED:-}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8765}
      MCP_PATH: ${MCP_PATH:-/mcp}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      # --- Run-logging ---
      RUN_LOG_ENABLED: ${RUN_LOG_ENABLED:-}
      NOCODB_RUNS_TABLE_ID: ${NOCODB_RUNS_TABLE_ID:-}
      NOCODB_RUN_EVENTS_TABLE_ID: ${NOCODB_RUN_EVENTS_TABLE_ID:-}
      RUN_LOG_RETENTION_DAYS: ${RUN_LOG_RETENTION_DAYS:-}
      APP_VERSION: ${APP_VERSION:-dev}
      # --- Fixed to the persistent volume ---
      JSON_STORE_PATH: /data/seen.json
      HEALTH_PATH: /data/health.json
      RUN_LOG_JSONL_PATH: /data/runs.jsonl
    volumes:
      - flatwatch-data:/data
    ports:
      - "${HEALTHCHECK_PORT:-8080}:${HEALTHCHECK_PORT:-8080}"
      - "${MCP_PORT:-8765}:${MCP_PORT:-8765}"

volumes:
  flatwatch-data:
